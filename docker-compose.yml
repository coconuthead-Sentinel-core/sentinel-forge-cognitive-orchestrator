version: '3.9'
services:
  app:
    build: .
    container_name: qnf_app
    environment:
      - QNF_ENV=prod
      - QNF_RATE_LIMIT_ENABLED=0
      # Uncomment to enforce API key on all routes
      # - QNF_API_KEY=change-me
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz').read()" ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # L2: Cerebellum - Monitoring
  prometheus:
    image: prom/prometheus
    container_name: qnf_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana
    container_name: qnf_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # L3: Left Hemisphere - Data Vault
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: qnf_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
